name: Validate plugin

# The repo IS the plugin (plugin-first). On every push/PR, sanity-check the plugin structure so a
# broken manifest or a stray toolkit path is caught before the community review pipeline sees it.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate plugin structure
        run: |
          set -e
          python3 -c "import json; json.load(open('.claude-plugin/plugin.json'))" && echo "✓ plugin.json is valid JSON"
          python3 -c "import json; json.load(open('.claude-plugin/marketplace.json'))" && echo "✓ marketplace.json is valid JSON"
          for f in agents/designer.md agents/executor.md agents/feedback.md skills/facilitation-practices/SKILL.md; do
            test -f "$f" || { echo "✗ missing $f"; exit 1; }
          done
          echo "✓ agents + skill present"
          if grep -rqs '\.claude/' agents skills; then echo "✗ stray .claude/ path (should be \${CLAUDE_PLUGIN_ROOT})"; exit 1; fi
          echo "✓ no stray .claude/ paths"
          grep -rqs 'CLAUDE_PLUGIN_ROOT' agents && echo "✓ plugin-root paths present"
