name: Plugin Release

# Trunk-based. No release branch.
# - Push to main / PR: build + test the generated plugin (CI). (Skipped for release commits that
#   only touch plugin/.)
# - Release: "Run workflow" (workflow_dispatch). Version is auto-computed (next semver from the latest
#   tag; first release -> 1.0.0). The publish job is gated by the `marketplace` environment (manual
#   approval), then commits the built plugin to ./plugin on main and tags v<version>. No version typing.

on:
  push:
    branches: [main]
    paths-ignore: ["plugin/**"]      # release commits only touch plugin/ — don't re-trigger CI
  pull_request:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump for this release"
        type: choice
        options: [patch, minor, major]
        default: minor

permissions:
  contents: write

jobs:
  build:
    name: Build & test plugin
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0                # full history so version can be derived from tags
      - name: Compute version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            v="$(bash scripts/next-version.sh "${{ inputs.bump }}")"
          else
            v="$(git describe --tags --match 'v*' --abbrev=0 2>/dev/null | sed 's/^v//' || echo 0.0.0)-dev"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "→ version: $v"
      - name: Generate + validate the plugin
        run: bash scripts/build-plugin.sh "${{ steps.ver.outputs.version }}"
      - name: Upload built plugin
        uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: build/plugin
          if-no-files-found: error

  publish:
    name: Publish to marketplace
    needs: build
    if: github.event_name == 'workflow_dispatch'   # release only on manual trigger
    runs-on: ubuntu-latest
    environment: marketplace                        # manual-approval gate (required reviewer)
    env:
      VERSION: ${{ needs.build.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Rebuild plugin at the release version
        run: bash scripts/build-plugin.sh "$VERSION"
      - name: Publish to ./plugin on main + tag (trunk-based)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/publish-plugin.sh
