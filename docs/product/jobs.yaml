# Jobs-to-be-Done — Facilitation Hub
# Opportunity score = importance (1-5) + (importance - satisfaction), higher = stronger opportunity.
# Lightweight discovery (single primary user); scores are the facilitator's own ratings.

jobs:
  - id: design-grounded-agenda
    primary: true
    persona: facilitator
    story: >
      When I'm asked to facilitate a workshop and I have a rough goal, audience, time box, and
      medium, I want to shape a well-structured, timed agenda grounded in proven facilitation
      practices, so I can walk in confident it will achieve its outcome and keep people engaged.
    dimensions:
      functional: Produce a timed agenda of named structures matched to goal, group size, duration, and medium — with rationale.
      emotional: Feel prepared and confident instead of winging it; lower pre-workshop anxiety.
      social: Be seen as an intentional, skilled facilitator with credible, methodical designs.
    forces:
      push: Blank-page design is slow; I forget good structures; designs aren't grounded in a consistent method.
      pull: A curated practices library + an assistant that proposes structures, timings, and rationale, and learns from my past sessions.
      anxiety: Suggestions might be generic or wrong for my context; fear of rigid templates; effort to seed the library.
      habit: Today I improvise from memory and scattered docs; I'd have to start from a structured brief.
    importance: 5
    satisfaction: 2
    opportunity_score: 8   # 5 + (5-2)
    feature: workshop-designer

  # ---- Secondary jobs (backlog; not built in the first feature) ----
  - id: learn-from-sessions
    primary: false
    persona: facilitator
    story: >
      When a session ends, I want to debrief what worked and what didn't into reusable lessons,
      so my next design starts smarter than the last.
    dimensions:
      functional: Turn a post-session brain-dump into a structured feedback record + extract tagged, reusable lessons.
      emotional: Relief that the insight isn't lost; closure after a session; a sense my effort compounds.
      social: Be a reflective practitioner who visibly improves session over session.
    forces:
      push: I rarely debrief; when tired I move straight to the next thing and the lessons evaporate.
      pull: A low-friction debrief that does the structuring for me and tags lessons so they resurface later.
      anxiety: Will it be busywork? Will tagging feel tedious? Will I actually do it when drained?
      habit: Today nothing is captured; reflection (if any) lives in my head and fades.
    importance: 4
    satisfaction: 1
    opportunity_score: 7
    feature: feedback-capture

  - id: reuse-lessons-in-design
    primary: false
    persona: facilitator
    story: >
      When I design a new workshop, I want the designer to surface relevant lessons from my past
      sessions, so I stop repeating mistakes and reuse what landed.
    importance: 4
    satisfaction: 1
    opportunity_score: 7
    feature: lessons-loop
    depends_on: [design-grounded-agenda, learn-from-sessions]

  - id: prep-the-room
    primary: false
    persona: facilitator
    story: >
      When a design is agreed, I want a concrete setup pack for the medium — a materials/setup
      checklist plus the per-structure prep steps — so I can prep fast and walk in with nothing forgotten.
    dimensions:
      functional: Turn an agreed design into a per-structure setup checklist + materials list for the medium (in-person or digital).
      emotional: Walk in calm and ready; no last-minute scramble; trust that nothing is missing.
      social: Appear organized and professional; the session runs smoothly from the first minute.
    forces:
      push: Prepping from the agenda each time is manual; I forget materials; per-structure needs live in my head.
      pull: A checklist + per-structure setup generated straight from my design, for the right medium.
      anxiety: Will it be generic or miss my context? Will digital prep actually match how Miro/video work?
      habit: Today I improvise prep from the agenda and occasionally forget something on the day.
    importance: 4
    satisfaction: 2
    opportunity_score: 6
    feature: executor
    # Medium model: executor maps brief medium → prep mode = in-person | digital (miro+video together).

  - id: grow-practice-library
    primary: false
    persona: facilitator
    story: >
      When I learn a new facilitation practice, I want to add it to my library as markdown without
      touching code, so the assistant can use it immediately.
    importance: 3
    satisfaction: 2
    opportunity_score: 4
    feature: library-extensibility
